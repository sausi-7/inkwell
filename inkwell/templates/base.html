<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Inkwell{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header class="topbar">
    <a href="/" class="brand" aria-label="Inkwell home">
      <svg class="brand-mark" width="22" height="22" viewBox="0 0 22 22" aria-hidden="true">
        <path d="M11 2 C 7 6, 4 9, 4 13 C 4 17, 7 20, 11 20 C 15 20, 18 17, 18 13 C 18 9, 15 6, 11 2 Z"
              fill="currentColor"/>
        <circle cx="8.5" cy="10" r="1.3" fill="rgba(255,255,255,0.55)"/>
      </svg>
      <span class="brand-name">Inkwell</span>
    </a>
    <nav class="nav">
      <a href="/" class="nav-link {% if active == 'home' %}active{% endif %}">Home</a>
      <a href="/profile" class="nav-link {% if active == 'profile' %}active{% endif %}">Profile</a>
      <a href="/settings" class="nav-link {% if active == 'settings' %}active{% endif %}">Settings</a>
      <a href="/scan" class="nav-link {% if active == 'scan' %}active{% endif %}">Scan</a>
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <span>Inkwell · open source · <a href="https://github.com/sausi-7/inkwell" target="_blank" rel="noopener">GitHub</a></span>
  </footer>

  <script src="/static/js/common.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
